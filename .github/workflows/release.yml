name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Per-version binaries (smaller, single version bundled)
          - runner: ubuntu-latest
            target: bun-linux-x64
            artifact: quran-gen-v1-linux-x64
            versions: v1
          - runner: ubuntu-latest
            target: bun-linux-x64
            artifact: quran-gen-v2-linux-x64
            versions: v2
          - runner: ubuntu-latest
            target: bun-linux-x64
            artifact: quran-gen-v4-linux-x64
            versions: v4
          - runner: macos-latest
            target: bun-darwin-arm64
            artifact: quran-gen-v1-darwin-arm64
            versions: v1
          - runner: macos-latest
            target: bun-darwin-arm64
            artifact: quran-gen-v2-darwin-arm64
            versions: v2
          - runner: macos-latest
            target: bun-darwin-arm64
            artifact: quran-gen-v4-darwin-arm64
            versions: v4
          # All-in-one binaries — one matrix entry per native runner to avoid
          # cross-arch pngquant/Skia .node mismatches.
          - runner: ubuntu-latest
            target: bun-linux-x64
            artifact: quran-gen-linux-x64
            versions: v1 v2 v4
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: quran-gen-linux-arm64
            versions: v1 v2 v4
          - runner: macos-latest
            target: bun-darwin-arm64
            artifact: quran-gen-darwin-arm64
            versions: v1 v2 v4
          # darwin-x64 (Intel macOS) intentionally omitted: GitHub-hosted macos-13
          # runners queue too long to be useful. Apple Silicon binary covers
          # virtually all users; revisit if x64 demand surfaces.

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Download assets from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download assets -D data/ -p "common.zip"
          (cd data && unzip -o -q common.zip && rm common.zip)
          for v in ${{ matrix.versions }}; do
            gh release download assets -D data/ -p "${v}.zip"
            (cd data && unzip -o -q "${v}.zip" && rm "${v}.zip")
          done

      - name: Package assets zip
        run: |
          dirs="common"
          for v in ${{ matrix.versions }}; do dirs="$dirs $v"; done
          (cd data && zip -r -q ../assets.zip $dirs)

      - name: Install pngquant from apt (linux-arm64)
        # pngquant-bin has no arm64 prebuilt and can't compile on the runner.
        if: matrix.target == 'bun-linux-arm64'
        run: sudo apt-get update && sudo apt-get install -y pngquant

      - name: Build binary with embedded assets
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          # `--external canvas` keeps the Cairo native binding (and its 15
          # sibling dylibs) out of the bundle. Skia (@napi-rs/canvas) ships a
          # single self-contained .node and is the only required engine.
          bun build src/cli.ts assets.zip --compile --external canvas --target="$TARGET" --outfile "$ARTIFACT"
          if [ -x node_modules/pngquant-bin/vendor/pngquant ]; then
            cp node_modules/pngquant-bin/vendor/pngquant pngquant
          else
            cp "$(command -v pngquant)" pngquant
          fi
          tar czf "$ARTIFACT.tar.gz" "$ARTIFACT" pngquant

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --title "$TAG" --generate-notes || true
          gh release upload "$TAG" quran-gen-*.tar.gz --clobber
