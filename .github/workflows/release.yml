name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Per-version binaries (smaller, single version bundled)
          - target: bun-linux-x64
            artifact: quran-gen-v1-linux-x64
            versions: v1
          - target: bun-linux-x64
            artifact: quran-gen-v2-linux-x64
            versions: v2
          - target: bun-linux-x64
            artifact: quran-gen-v4-linux-x64
            versions: v4
          - target: bun-darwin-arm64
            artifact: quran-gen-v1-darwin-arm64
            versions: v1
          - target: bun-darwin-arm64
            artifact: quran-gen-v2-darwin-arm64
            versions: v2
          - target: bun-darwin-arm64
            artifact: quran-gen-v4-darwin-arm64
            versions: v4
          # All-in-one binaries
          - target: bun-linux-x64
            artifact: quran-gen-linux-x64
            versions: v1 v2 v4
          - target: bun-linux-arm64
            artifact: quran-gen-linux-arm64
            versions: v1 v2 v4
          - target: bun-darwin-arm64
            artifact: quran-gen-darwin-arm64
            versions: v1 v2 v4
          - target: bun-darwin-x64
            artifact: quran-gen-darwin-x64
            versions: v1 v2 v4

    runs-on: ${{ contains(matrix.target, 'darwin') && 'macos-latest' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Download assets from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download assets -D data/ -p "common.zip"
          (cd data && unzip -o -q common.zip && rm common.zip)
          for v in ${{ matrix.versions }}; do
            gh release download assets -D data/ -p "${v}.zip"
            (cd data && unzip -o -q "${v}.zip" && rm "${v}.zip")
          done

      - name: Package assets zip
        run: |
          dirs="common"
          for v in ${{ matrix.versions }}; do dirs="$dirs $v"; done
          (cd data && zip -r -q ../assets.zip $dirs)

      - name: Build binary with embedded assets
        run: |
          bun build src/cli.ts assets.zip --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}
          cp node_modules/pngquant-bin/vendor/pngquant pngquant
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }} pngquant

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --title "$TAG" --generate-notes || true
          gh release upload "$TAG" quran-gen-*.tar.gz --clobber
