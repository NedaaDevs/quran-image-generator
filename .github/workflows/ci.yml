name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Lint and format check
        run: bunx biome check src/ scripts/ test/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Type check
        run: bunx tsc --noEmit

  # NOTE: the layout/render suite (`bun test`) is a local / pre-publish gate, not a CI job.
  # It validates the *built* artifacts (data/<v>/quran-layout.db, rendered bounds), which are
  # generated from sources under data/all/ that aren't committed or published — CI only has the
  # stale per-version release zips to pull, so it can't test the current code's output. Run it
  # locally after `bun scripts/build-layout.ts all`, before re-uploading the assets.

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        run: bun run build
